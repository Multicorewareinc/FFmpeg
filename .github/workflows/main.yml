name: FFmpeg ARM64EC Master Build

on:
  push:
    branches:
      - "master_arm64ec"

env:
  FFMPEG_VERSION: "master"

jobs:
  build-test:
    name: Build & Test FFmpeg ARM64EC
    # Native ARM64 Windows 11 runner
    runs-on: windows-11-arm

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Set up MSYS2 (CLANGARM64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          path-type: inherit
          install: >-
            base-devel
            git
            nasm
            yasm
            diffutils
            make
            pkg-config
            perl
            rsync

      - name: Clone gas-preprocessor
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/FFmpeg/gas-preprocessor.git C:\gas-preprocessor
          Write-Host "gas-preprocessor cloned to C:\gas-preprocessor"
          Get-ChildItem C:\gas-preprocessor

      - name: Fix PATH
        run: |
          # Rename MSYS2's GNU link.exe so MSVC link.exe is found instead
          mv /usr/bin/link.exe /usr/bin/link_gnu.exe
          echo "$(cygpath -u "$VCToolsInstallDir")bin/HostARM64/ARM64" >> $GITHUB_PATH
          echo "/c/gas-preprocessor" >> $GITHUB_PATH

      - name: Verify toolchain in MSYS2
        run: |
          set -eo pipefail
          echo "==> Checking MSVC tools on PATH ..."
          which cl.exe       && cl.exe        || echo "WARNING: cl.exe not found"
          which link.exe     && link.exe      || echo "WARNING: link.exe not found"
          which lib.exe                       || echo "WARNING: lib.exe not found"
          which armasm64.exe                  || echo "WARNING: armasm64.exe not found"
          echo ""
          echo "==> Checking gas-preprocessor ..."
          ls /c/gas-preprocessor/
          perl /c/gas-preprocessor/gas-preprocessor.pl --help || true
          echo ""
          echo "==> NASM / YASM ..."
          nasm --version
          yasm --version

      - name: Configure FFmpeg for ARM64EC
        run: |
          set -eo pipefail
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"

          echo "==> Running ./configure ..."
          ./configure \
            --toolchain=msvc \
            --target-os=win64 \
            --arch=arm64 \
            --cc=cl.exe \
            --cxx=cl.exe \
            --ld=link.exe \
            --ar="lib.exe -machine:arm64ec" \
            --extra-cflags="-arm64EC" \
            --extra-cxxflags="-arm64EC" \
            --extra-ldflags="/machine:arm64ec" \
            --as="armasm64.exe -machine ARM64EC" \
            --enable-shared \
            --disable-doc \
            --prefix=/c/ffmpeg-arm64ec \
            --samples=/c/fate-samples

          echo "==> Configure complete."

      - name: Build FFmpeg
        run: |
          set -eo pipefail
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"

          echo "==> Building with $(nproc) parallel jobs ..."
          make -j$(nproc)
          echo "==> Build complete."

      - name: Install FFmpeg
        run: |
          set -eo pipefail
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"
          make install
          echo "==> Installed artifacts:"
          ls /c/ffmpeg-arm64ec/bin/ || true
          ls /c/ffmpeg-arm64ec/lib/ || true

      - name: Cache FATE samples
        uses: actions/cache@v4
        with:
          path: C:/fate-samples
          key: fate-samples
          restore-keys: fate-samples

      - name: Download FATE samples
        run: |
          make fate-rsync SAMPLES=/c/fate-samples

      - name: Run FATE tests
        continue-on-error: true
        run: |
          cd "$(cygpath -u "$GITHUB_WORKSPACE")"
          export PATH="/c/ffmpeg-arm64ec/bin:$PATH"
          make fate -k SAMPLES=/c/fate-samples GEN=1 2>&1 | tee /tmp/fate-results.txt || true

      - name: Package build artifacts
        shell: pwsh
        run: |
          $prefix  = "C:\ffmpeg-arm64ec"
          $zipName = "ffmpeg-${{ env.FFMPEG_VERSION }}-win-arm64ec.zip"
          $zipPath = "${{ github.workspace }}\$zipName"

          Write-Host "==> Packaging $zipName ..."
          Compress-Archive -Path "$prefix\*" -DestinationPath $zipPath -Force

          "RELEASE_ZIP=$zipPath"      | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "==> Package ready: $zipPath"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ env.FFMPEG_VERSION }}-win-arm64ec
          path: ${{ env.RELEASE_ZIP }}
          retention-days: 30
